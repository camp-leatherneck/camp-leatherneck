# GoReleaser configuration for Camp Leatherneck (lt)
# See https://goreleaser.com for documentation
#
# This config builds the `lt` binary for macOS and Linux (arm64 + amd64),
# produces .tar.gz archives with checksums, and auto-publishes a Homebrew
# Formula update to the camp-leatherneck/homebrew-tap repo on release.
#
# The GitHub Actions workflow that invokes `goreleaser release` on tag push
# is tracked separately (hq-07z). The TAP_GITHUB_TOKEN env var must be set
# in that workflow environment — it's a PAT with repo-write access to the
# camp-leatherneck/homebrew-tap repo.

version: 2

project_name: camp-leatherneck

before:
  hooks:
    - go mod tidy

builds:
  - id: lt
    main: ./cmd/lt
    binary: lt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/camp-leatherneck/camp-leatherneck/internal/cmd.Version={{.Version}}
      - -X github.com/camp-leatherneck/camp-leatherneck/internal/cmd.Build={{.ShortCommit}}
      - -X github.com/camp-leatherneck/camp-leatherneck/internal/cmd.Commit={{.Commit}}
      - -X github.com/camp-leatherneck/camp-leatherneck/internal/cmd.Branch={{.Branch}}

archives:
  - id: lt-archive
    ids:
      - lt
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: '^.*feat(\(\w+\))?:.*$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*fix(\(\w+\))?:.*$'
      order: 1
    - title: "Others"
      order: 999

brews:
  - name: lt
    ids:
      - lt-archive
    repository:
      owner: camp-leatherneck
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/camp-leatherneck/camp-leatherneck"
    description: "Marine-themed multi-agent workspace manager (Camp Leatherneck — fork of Gas Town)"
    license: "MIT"
    commit_author:
      name: camp-leatherneck-bot
      email: jdeleon@jcmdsolutions.com
    commit_msg_template: "lt: release {{ .Tag }}"
    install: |
      bin.install "lt"
    test: |
      system "#{bin}/lt", "--version"

release:
  github:
    owner: camp-leatherneck
    name: camp-leatherneck
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Camp Leatherneck v{{.Version}}

    Pre-compiled `lt` binaries for macOS and Linux (arm64 + amd64).

    ### Installation

    **Homebrew (macOS/Linux):**
    ```bash
    brew tap camp-leatherneck/tap
    brew install lt
    ```

    **curl | bash (fallback):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/camp-leatherneck/camp-leatherneck/main/install.sh | bash
    ```

    **Manual:**
    Download the archive for your platform below, extract, and place `lt` on your `PATH`.
    Then run `lt install` to bootstrap your `~/lt/` workspace.

announce:
  skip: true
