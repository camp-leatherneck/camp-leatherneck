name: Release

# Camp Leatherneck release workflow.
#
# Trigger: push of a tag matching `v*` (e.g. v0.1.0, v0.1.0-pre.1).
# Action:  goreleaser builds cross-platform `lt` binaries, publishes a
#          GitHub Release on this repo, and pushes an updated Formula
#          to camp-leatherneck/homebrew-tap.
#
# Required secrets:
#   GITHUB_TOKEN      — provided automatically by GitHub Actions. Used
#                       to publish the release on THIS repo.
#   TAP_GITHUB_TOKEN  — MUST be set manually by a human with admin on
#                       this repo. Fine-grained PAT scoped to
#                       camp-leatherneck/homebrew-tap with
#                       Contents: Read and write. Goreleaser uses this
#                       to push the updated Formula/lt.rb.
#                       Set with:
#                         gh secret set TAP_GITHUB_TOKEN \
#                           --repo camp-leatherneck/camp-leatherneck
#                       See .github/RELEASING.md for full instructions.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # goreleaser needs full tag history

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Reject replace directives in go.mod
        run: |
          if grep -qE '^replace[[:space:]]' go.mod; then
            echo "ERROR: go.mod contains replace directives — aborting release."
            echo "Replace directives break 'go install ...@latest'."
            grep -n '^replace' go.mod
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to camp-leatherneck/homebrew-tap.
          # See .github/RELEASING.md for rotation and setup procedure.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          # Force goreleaser to use the dispatched/pushed ref as the release
          # version. Without this, when multiple tags point at the same commit
          # (e.g. v0.1.0-pre.1 and v0.1.0), goreleaser's tag autodetect can
          # pick the wrong one and build artifacts under the stale name.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
