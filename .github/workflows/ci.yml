name: CI

# Camp Leatherneck CI — runs on every PR and push to main.
#
# Scope: lightweight, fast feedback. Heavy integration work lives in
# nightly-integration.yml. This workflow focuses on:
#   - go test (short, race-free for speed)
#   - shellcheck on install.sh + embedded scripts + docker-entrypoint.sh
#   - goreleaser config validation
#
# NOTE on test failures:
# Three packages have pre-existing failures inherited from the Gas Town
# baseline (documented by prior Sapper reports):
#   - internal/cmd
#   - internal/doctor
#   - internal/rig
# The `test` job scopes `go test` to the remaining packages so PRs are
# not blocked on these known-red envelopes. When those packages are
# stabilized, drop the explicit package list below and revert to `./...`.

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (go test -short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: go build
        run: go build ./cmd/lt

      # Run tests across all packages EXCEPT the three known-failing
      # baseline envelopes. When they go green, replace this list with
      # a plain `go test -short ./...` and delete this comment block.
      - name: go test (allowlist, excluding known-red baseline packages)
        run: |
          set -euo pipefail
          mapfile -t pkgs < <(
            go list ./... \
              | grep -vE '^github.com/camp-leatherneck/camp-leatherneck/internal/(cmd|doctor|rig)($|/)'
          )
          echo "Testing ${#pkgs[@]} packages (excluded: internal/cmd, internal/doctor, internal/rig)"
          go test -short -timeout=5m "${pkgs[@]}"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck install.sh
        run: shellcheck install.sh

      - name: shellcheck docker-entrypoint.sh
        run: shellcheck docker-entrypoint.sh

      - name: shellcheck internal/assets/scripts/*.sh
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(internal/assets/scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No embedded scripts found — skipping."
            exit 0
          fi
          shellcheck "${files[@]}"

  goreleaser-check:
    name: GoReleaser Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
